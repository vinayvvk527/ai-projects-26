services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped

  ui:
    build:
      context: ./chainlit_ui
      dockerfile: Dockerfile
    environment:
      - BACKEND_URL=http://backend:8000
      - CHAT_MODEL=claude-sonnet-4-5
    ports:
      - "8001:8001"
    depends_on:
      - backend
    restart: unless-stopped
